<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Base Apparel coming soon page</title>
</head>
<body>
  <header>
    <img src="images/logo.svg" alt="base apparel logo">
  </header>

  <div class="images">
    <img src="images/hero-mobile.jpg" alt="woman" class="img-mobile">
    <img src="images/hero-desktop.jpg" alt="woman" class="img-desktop">
  </div>

  <h1>
    We're <strong>coming soon</strong>
  </h1>

  <p>
    Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay up-to-date with announcements and our launch deals.
  </p>

  <input type="email" name="email" id="id-email" placeholder="Email Address">
  <img src="images/icon-error.svg" alt="error">
  <button type="submit"><img src="images/icon-arrow.svg" alt="arrow"></button>
  <p>Please provide a valid email</p>
  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
