<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Ping coming soon page</title>
  <script src="https://kit.fontawesome.com/8446548d95.js" crossorigin="anonymous"></script>
</head>
<body>
  <main>
    <header>
      <img src="images/logo.svg" alt="logo ping">

      <div id="test-presentation">
        <h1>We are launching <strong>soon!</strong></h1>
        <p>Subscribe and get notified</p>
      </div>
    </header>

    <section id="email-input">
      <input type="email" name="email" id="id-email" placeholder="Your email address..." required>
      <p id="invalid-email" class="error-msg">Please provide a valid email address</p>
      <p id="empty-input" class="error-msg">Whoops! It looks like you forgot to add your email</p>
      <button>Notify Me</button>
    </section>

    <section id="img-db">
      <img src="images/illustration-dashboard.png" alt="dashboard">
    </section>

    <section id="social-media">
      <a href="#" aria-label="Facebook" class="sm-btn"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#" aria-label="Twitter" class="sm-btn"><i class="fa-brands fa-twitter"></i></a>
      <a href="#" aria-label="Instagram" class="sm-btn"><i class="fa-brands fa-instagram"></i></a>
    </section>

    <div id="copyright">&copy; Copyright Ping. All rights reserved.</div>
  </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Liandra Cruz</a>.
    </footer>

  <script>
    const emailInput = document.querySelector('#id-email');
    const btn = document.querySelector('button');
    const invalidEmail = document.querySelector('#invalid-email');
    const emptyInput = document.querySelector('#empty-input');
    const socialMediaElements = document.querySelectorAll('.sm-btn')

    btn.addEventListener('click', (event) => {
      const userEmail = emailInput.value;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const isValid = emailRegex.test(userEmail);

      if(userEmail === "") {
        emptyInput.style.display = "block";
        invalidEmail.style.display = "none";
        emailInput.style.border = "1px solid #ff5263";
      } else if(!isValid) {
        invalidEmail.style.display = "block";
        emptyInput.style.display = "none";
        emailInput.style.border = "1px solid #ff5263";
      }
    });

    socialMediaElements.forEach((element) => {
      element.addEventListener('click', () => {
        alert('This element is for aesthetic purposes only.');
      });
    });
  </script>
</body>
</html>
