<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Ping coming soon page</title>
  <script src="https://kit.fontawesome.com/8446548d95.js" crossorigin="anonymous"></script>
</head>
<body>

  <main>
    <header>
      <img src="images/logo.svg" alt="logo ping">

      <div id="test-presentation">
        <h1>We are launching <strong>soon!</strong></h1>
        <p>Subscribe and get notified</p>
      </div>
    </header>

    <section id="email-input">
      <input type="email" name="email" id="id-email" placeholder="Your email address..." required>
      <button>Notify Me</button>
    </section>

    <section id="img-db">
      <img src="images/illustration-dashboard.png" alt="dashboard">
    </section>

    <section id="social-media">
      <a href="#" class="sm-btn"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#" class="sm-btn"><i class="fa-brands fa-twitter"></i></a>
      <a href="#" class="sm-btn"><i class="fa-brands fa-instagram"></i></a>
    </section>

    <div id="copyright">&copy; Copyright Ping. All rights reserved.</div>
  </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Liandra Cruz</a>.
    </footer>
</body>
</html>
