<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Ping coming soon page</title>
  <script src="https://kit.fontawesome.com/8446548d95.js" crossorigin="anonymous"></script>
</head>
<body>

  <main>
    <header>
      <img src="images/logo.svg" alt="logo ping">

      <div class="test-presentation">
        <h1>We are launching soon!</h1>
        <p>Subscribe and get notified</p>
      </div>
    </header>

    <section class="notification">
      <input type="email" name="email" id="id-email" placeholder="Your email address..." required>
      <button>Notify Me</button>
    </section>

    <section class="img-db">
      <img src="images/illustration-dashboard.png" alt="dashboard">
    </section>

    <section class="social-media">
      <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#"><i class="fa-brands fa-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
    </section>

    <div class="copyright">&copy; Copyright Ping. All rights reserved.</div>
  </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Your Name Here</a>.
    </footer>
</body>
</html>
